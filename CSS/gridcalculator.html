<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grid Calculator</title>
    <link rel="stylesheet" href="gridcal.css">
</head>
<body>
<div class="heads">
    <h1>Grid Calculator</h1>
</div>
<div class="calculator">

    <input type="text" class="display" placeholder="0">

    <button>7</button>
    <button>8</button>
    <button>9</button>
    <button>/</button>

    <button>4</button>
    <button>5</button>
    <button>6</button>
    <button>*</button>

    <button>1</button>
    <button>2</button>
    <button>3</button>
    <button>-</button>

    <button>0</button>
    <button>.</button>
    <button>=</button>
    <button>+</button>

</div>

</body>
</html>
